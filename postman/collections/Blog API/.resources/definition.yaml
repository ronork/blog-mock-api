$kind: collection
description: >-
  A RESTful Blog API built with Express and TypeScript. Supports authentication
  via JWT Bearer tokens, full CRUD for posts, comments, and user profile
  management.


  **Base URL:** `{{baseUrl}}`


  ## Authentication

  Protected endpoints require a Bearer token in the `Authorization` header.
  Obtain a token via `POST /auth/login` or `POST /auth/register`, then set it as
  the `token` collection variable.
variables:
  baseUrl: http://localhost:3000
  token: ""
  refreshToken: ""
  postId: ""
  commentId: ""
  userId: ""
auth:
  - id: ce8e812c-5cab-4f73-a464-e0f7a925c6f4
    type: bearer
    name: bearer auth
    credentials:
      token: "{{token}}"
