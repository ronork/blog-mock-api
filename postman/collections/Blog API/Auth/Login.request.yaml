$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/auth/login'
order: 2000
auth:
  type: noauth
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "jane@example.com",
      "password": "password123"
    }
description: |-
  Authenticate with email and password.

  Returns a JWT `token` (24h) and `refreshToken` (7d). Store the token in the `token` collection variable to authenticate subsequent requests.
