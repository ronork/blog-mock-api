$kind: http-request
url: "{{baseUrl}}:/posts?page=1&limit=10"
method: GET
queryParams:
  - key: page
    value: "1"
    description: "Page number (default: 1)"
  - key: limit
    value: "10"
    description: "Results per page, max 50 (default: 10)"
  - key: tag
    value: ""
    disabled: true
    description: Filter posts by tag
  - key: published
    value: "true"
    disabled: true
    description: Set to false to include unpublished posts
order: 1000
